<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floral Resonances | Home</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #fcfcfc;
            font-family: 'Georgia', serif;
            color: #333;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Top Navigation Bar */
        .nav-container {
            position: absolute;
            top: 40px;
            width: 90%;
            display: flex;
            justify-content: space-between; /* Purpose Left, Explore Right */
            align-items: center;
            z-index: 20;
        }

        .nav-link {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-decoration: none;
            color: #888;
            text-transform: uppercase;
            transition: 0.4s;
            border-bottom: 1px solid transparent;
            padding-bottom: 5px;
        }

        .nav-link:hover {
            color: #000;
            border-bottom: 1px solid #000;
        }

        .main-title {
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        /* The 'WHATS UNIQUE' text */
        .trigger-text {
            font-size: 2.5rem;
            cursor: pointer;
            transition: opacity 0.8s ease, letter-spacing 0.8s ease;
            z-index: 10;
            padding: 20px;
        }

        .trigger-text.faded {
            opacity: 0.1;
            letter-spacing: 12px;
        }

        #reveal-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.98);
            max-width: 80vw;
            max-height: 80vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out, transform 0.8s ease;
            z-index: 5;
            pointer-events: none; /* Mouse passes through the image to the body */
        }

        #reveal-image.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            font-style: italic;
            opacity: 0.3;
            letter-spacing: 1px;
        }
    </style>
</head>
<body onmouseover="hideEverything()">

    <nav class="nav-container">
        <a href="purpose.html" class="nav-link">The Purpose</a>
        <a href="view.html" class="nav-link">Explore</a>
    </nav>

    <div class="main-title">A Unique Space</div>

    <div id="text-trigger" class="trigger-text" onmouseover="event.stopPropagation(); showImage()">
        WHATS UNIQUE
    </div>

    <img id="reveal-image" src="whats-unique-flowers.jpg" alt="Unique Flowers">

    <div class="footer">"The architecture of the seen, whispering the secrets of the unseen."</div>

    <script>
        const img = document.getElementById('reveal-image');
        const text = document.getElementById('text-trigger');

        function showImage() {
            img.classList.add('visible');
            text.classList.add('faded');
        }

        function hideEverything() {
            img.classList.remove('visible');
            text.classList.remove('faded');
        }
    </script>
</body>
</html>
